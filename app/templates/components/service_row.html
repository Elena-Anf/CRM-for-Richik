{% for s in services %}
<tr>
  <td class="px-6 py-4">{{ s.name }}</td>
  <td class="px-6 py-4">{{ s.price }} ₽</td>
  <td class="px-6 py-4">{{ s.cost_price }} ₽</td>
  <td class="px-6 py-4 text-green-600">{{ s.price - s.cost_price }} ₽</td>
  <td class="px-6 py-4">{{ s.duration_minutes }} мин</td>
  <td class="px-6 py-4">{{ s.category or '—' }}</td>
</tr>
{% endfor %}
